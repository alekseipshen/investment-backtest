*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0b0e14;color:#c9d1d9;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px}

.header{text-align:center;padding:32px 16px 20px}
.header h1{font-size:clamp(22px,4vw,36px);font-weight:800;color:#fff;line-height:1.2;margin-bottom:8px}
.header .accent{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#6b7280;font-size:clamp(13px,2vw,16px);max-width:700px;margin:0 auto;line-height:1.6}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.lang-switch{display:flex;gap:2px;background:#161b22;border-radius:8px;padding:2px}
.lang-btn{padding:6px 16px;border:none;border-radius:6px;background:transparent;color:#6b7280;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.lang-btn.active{background:#3b82f6;color:#fff}
.tg-badge{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#2AABEE,#229ED9);padding:8px 16px;border-radius:10px;text-decoration:none;color:#fff;font-size:13px;font-weight:600;transition:.2s;white-space:nowrap}
.tg-badge:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(42,171,238,.3)}
.tg-badge svg{width:20px;height:20px;flex-shrink:0}

.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{padding:10px 20px;border-radius:10px 10px 0 0;background:#161b22;color:#6b7280;border:1px solid #21262d;border-bottom:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;white-space:nowrap;flex-shrink:0}
.tab.active{background:#1c2333;color:#fff;border-color:#30363d}
.tab:hover:not(.active){color:#aaa}

.toggle-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.toggle-btn{padding:6px 14px;border-radius:20px;border:2px solid;background:transparent;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;opacity:1}
.toggle-btn.off{opacity:.25}
.toggle-btn:hover{transform:scale(1.05)}

.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.controls label{font-size:12px;color:#6b7280;font-weight:500}
.controls select{background:#161b22;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:8px;font-size:13px;font-family:inherit}

.chart-box{background:#161b22;border-radius:14px;padding:12px;margin-bottom:16px;border:1px solid #21262d}
.chart-inner{height:480px}
.view{display:none}.view.active{display:block}

.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px}
.card{background:#161b22;border-radius:12px;padding:14px 16px;border:1px solid #21262d;border-left:3px solid;transition:.2s}
.card:hover{border-color:#30363d}
.card .name{font-size:14px;font-weight:700;margin-bottom:8px}
.card .row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.card .lbl{color:#6b7280}.card .val{font-weight:600}
.up{color:#22c55e}.dn{color:#ef4444}.mid{color:#eab308}

.holdings{background:#161b22;border-radius:14px;padding:16px;border:1px solid #21262d;margin-bottom:20px}
.holdings h3{font-size:15px;font-weight:700;margin-bottom:12px;color:#fff}
.yr-btn{display:inline-block;margin:3px;padding:5px 12px;background:#21262d;border-radius:8px;font-size:12px;cursor:pointer;transition:.15s;color:#c9d1d9;font-weight:500}
.yr-btn:hover,.yr-btn.on{background:#3b82f6;color:#fff}
.h-list{margin-top:12px;font-size:13px;line-height:2.2}
.h-list .rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;margin-right:4px;color:#fff}
.h-list .rk.g1{background:#3b82f6}.h-list .rk.g2{background:#6366f1}.h-list .rk.g3{background:#8b5cf6}
.h-list .tk{font-weight:700;color:#fff;margin-right:2px}
.h-list .cn{color:#6b7280;font-size:12px;margin-right:12px}

.method{background:#161b22;border-radius:14px;padding:20px;border:1px solid #21262d;margin-bottom:20px;font-size:13px;line-height:1.7;color:#8b949e}
.method h3{color:#fff;font-size:15px;margin-bottom:10px}
.method ul{padding-left:20px}
.method li{margin-bottom:4px}

.footer{text-align:center;padding:32px 16px;border-top:1px solid #21262d;margin-top:20px}
.footer .tg-cta{display:inline-block;max-width:480px;text-align:center;margin-bottom:16px}
.footer .tg-cta-text{color:#8b949e;font-size:13px;line-height:1.6;margin-bottom:14px}
.footer .tg-big{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#2AABEE,#229ED9);padding:14px 28px;border-radius:14px;text-decoration:none;color:#fff;font-size:16px;font-weight:700;transition:.2s;margin-bottom:12px}
.footer .tg-big:hover{transform:scale(1.04);box-shadow:0 6px 30px rgba(42,171,238,.35)}
.footer .tg-big svg{width:24px;height:24px}
.footer .copy{color:#484f58;font-size:12px;margin-top:8px}

.insight{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(139,92,246,.08));border:1px solid rgba(59,130,246,.15);border-radius:14px;padding:24px 20px;margin-bottom:20px;text-align:center}
.insight .big{font-size:clamp(28px,5vw,48px);font-weight:800;color:#fff;line-height:1.1}
.insight .big .hl{color:#22c55e}
.insight .sub{color:#6b7280;font-size:14px;margin-top:8px}

/* Explainer blocks */
.explainer{background:#161b22;border-radius:12px;padding:16px 20px;margin-bottom:12px;border:1px solid #21262d;border-left:3px solid #3b82f6}
.explainer p{font-size:13px;color:#8b949e;line-height:1.7;margin:0}
.explainer strong{color:#c9d1d9}
.explainer .hint{font-size:12px;color:#484f58;margin-top:6px;font-style:italic}

/* Intro section */
.intro{background:#161b22;border-radius:14px;padding:20px 24px;margin-bottom:24px;border:1px solid #21262d}
.intro h2{color:#fff;font-size:17px;font-weight:700;margin-bottom:12px}
.intro p{font-size:14px;color:#8b949e;line-height:1.7;margin-bottom:10px}
.intro p:last-child{margin-bottom:0}
.intro .strategies{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:14px 0}
.intro .strat{background:#21262d;border-radius:8px;padding:10px 14px;font-size:13px}
.intro .strat strong{color:#fff;display:block;margin-bottom:2px}
.intro .strat span{color:#6b7280}

/* Glossary */
.glossary{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:20px}
.glossary .term{background:#161b22;border-radius:10px;padding:12px 14px;border:1px solid #21262d}
.glossary .term dt{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.glossary .term dd{font-size:12px;color:#6b7280;line-height:1.5}

/* Mid CTA */
.mid-cta{background:linear-gradient(135deg,rgba(42,171,238,.08),rgba(34,158,217,.08));border:1px solid rgba(42,171,238,.15);border-radius:12px;padding:16px 20px;margin:20px 0;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mid-cta .text{flex:1;min-width:200px}
.mid-cta .text p{font-size:13px;color:#8b949e;line-height:1.5;margin:0}
.mid-cta .text strong{color:#c9d1d9}
.mid-cta a{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#2AABEE,#229ED9);padding:10px 20px;border-radius:10px;text-decoration:none;color:#fff;font-size:13px;font-weight:600;transition:.2s;white-space:nowrap}
.mid-cta a:hover{transform:scale(1.03)}
.mid-cta a svg{width:18px;height:18px}

@media(max-width:640px){
  .container{padding:8px}
  .controls{gap:4px}
  .controls select{padding:5px 8px;font-size:12px}
  .controls label{font-size:11px}
  .metrics{grid-template-columns:1fr}
  .tabs{gap:2px}
  .tab{padding:8px 12px;font-size:12px}
  .mid-cta{flex-direction:column;text-align:center}
  .glossary{grid-template-columns:1fr}
  .chart-box{padding:2px;border-radius:10px}
  .chart-inner{height:350px}
  .toggle-row{gap:4px}
  .toggle-btn{padding:5px 10px;font-size:11px}
  .header h1{font-size:22px}
  .header{padding:20px 8px 14px}
  .insight{padding:16px 12px}
  .insight .big{font-size:28px}
  .explainer{padding:10px 12px}
  .explainer p{font-size:12px}
  .intro{padding:14px 16px}
  .intro p{font-size:13px}
  .intro .strategies{grid-template-columns:1fr 1fr}
}
</style>

let lang = 'ru';
let curTab = 'growth';
const vis = {};
const TABS = ['growth','relative','drawdown','rolling'];

const CLR = {
  "Top 1":"#ef4444","Top 3":"#f97316","Top 5":"#eab308","Top 7":"#22c55e","Top 10":"#3b82f6",
  "S&P 500":"#94a3b8","Nasdaq 100":"#a855f7","S&P 500 Growth":"#14b8a6",
  "Russell 1000 Growth":"#6366f1","Dow Jones":"#78716c","S&P 500 IT":"#ec4899",
  "Gold (GLD)":"#fbbf24"
};
const DEF_ON = isMobile
  ? new Set(["Top 1","Top 5","S&P 500"])
  : new Set(["Top 1","Top 3","Top 5","S&P 500","Nasdaq 100"]);
Object.keys(D.series).forEach(n => vis[n] = DEF_ON.has(n));

// ==================== i18n apply ====================
function t(key) { return I[lang][key] || key; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === l.toUpperCase()));
  applyI18n();
  buildTabs();
  buildMethod();
  buildIntro();
  buildGlossary();
  buildExplainers();
  draw();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (I[lang][k] !== undefined) el.innerHTML = I[lang][k];
  });
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    const k = el.dataset.i18nOpt;
    if (I[lang][k] !== undefined) el.textContent = I[lang][k];
  });
}

// ==================== UI builders ====================
function buildTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  TABS.forEach(id => {
    const d = document.createElement('div');
    d.className = 'tab' + (id === curTab ? ' active' : '');
    d.textContent = t('tab_' + id);
    d.onclick = () => { curTab = id; buildTabs(); showView(); };
    c.appendChild(d);
  });
}

function showView() {
  TABS.forEach(id => {
    const el = document.getElementById('v-' + id);
    if (el) el.classList.toggle('active', id === curTab);
  });
  // Move toggles and controls into active view
  const activeView = document.getElementById('v-' + curTab);
  const togglesEl = document.getElementById('toggles-src');
  const ctrlsEl = document.getElementById('controls-src');
  const chartBox = activeView.querySelector('.chart-box');
  if (chartBox && togglesEl) activeView.insertBefore(togglesEl, chartBox);
  if (chartBox && ctrlsEl) activeView.insertBefore(ctrlsEl, chartBox);
  togglesEl.style.display = '';
  ctrlsEl.style.display = '';
  togglesEl.className = 'toggle-row';
  ctrlsEl.className = 'controls';
  const rc = document.getElementById('rollCtrl');
  if (rc) rc.style.display = curTab === 'rolling' ? 'inline' : 'none';
}

function buildToggles() {
  const c = document.getElementById('toggles-src');
  c.innerHTML = '';
  Object.keys(D.series).forEach(name => {
    const b = document.createElement('button');
    b.className = 'toggle-btn' + (vis[name] ? '' : ' off');
    b.style.borderColor = CLR[name] || '#666';
    b.style.color = CLR[name] || '#fff';
    b.textContent = name;
    b.onclick = () => { vis[name] = !vis[name]; b.classList.toggle('off'); draw(); };
    c.appendChild(b);
  });
}

function buildMethod() {
  const ul = document.getElementById('methodList');
  ul.innerHTML = '';
  t('method').forEach(m => { const li = document.createElement('li'); li.textContent = m; ul.appendChild(li); });
}

function buildHoldings() {
  const c = document.getElementById('yrBtns');
  c.innerHTML = '';
  const years = Object.keys(D.top10_by_year).sort();
  years.forEach(y => {
    const s = document.createElement('span');
    s.className = 'yr-btn';
    s.textContent = y;
    s.onclick = () => showH(y, s);
    c.appendChild(s);
  });
  if (years.length) showH(years[years.length - 1], c.lastChild);
}

function showH(year, btn) {
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const list = document.getElementById('hList');
  const h = D.top10_by_year[year];
  if (!h) { list.innerHTML = '—'; return; }
  list.innerHTML = '<strong>' + year + ':</strong><br>' +
    h.map((tk, i) => {
      const gc = i < 3 ? 'g1' : i < 6 ? 'g2' : 'g3';
      const cn = D.company_names[tk] || '';
      return `<span class="rk ${gc}">${i+1}</span><span class="tk">${tk}</span><span class="cn">${cn}</span>`;
    }).join(' ');
}

// ==================== Data utils ====================
function getRange() {
  const p = document.getElementById('periodSel').value;
  const last = new Date(D.dates[D.dates.length - 1]);
  let start = new Date(D.dates[0]);
  if (p !== 'all') { start = new Date(last); start.setFullYear(start.getFullYear() - parseInt(p)); }
  return { s: start, e: last };
}

function filt(vals, range) {
  const fd = [], fv = [];
  for (let i = 0; i < D.dates.length; i++) {
    const d = new Date(D.dates[i]);
    if (d >= range.s && d <= range.e && vals[i] !== null) { fd.push(D.dates[i]); fv.push(vals[i]); }
  }
  return { d: fd, v: fv };
}

function norm(vals) {
  if (!vals.length) return [];
  const b = vals[0];
  return vals.map(v => v / b * 10000);
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function usd(v) { return '$' + Math.round(v).toLocaleString(); }

function metrics(dates, vals) {
  if (vals.length < 10) return null;
  const tr = vals[vals.length-1] / vals[0] - 1;
  const yrs = (new Date(dates[dates.length-1]) - new Date(dates[0])) / (1000*86400*365.25);
  if (yrs <= 0) return null;
  const cagr = Math.pow(vals[vals.length-1] / vals[0], 1/yrs) - 1;
  let peak = vals[0], mdd = 0;
  for (const v of vals) { if (v > peak) peak = v; const dd = (v-peak)/peak; if (dd < mdd) mdd = dd; }
  const rets = [];
  for (let i = 1; i < vals.length; i++) rets.push(vals[i]/vals[i-1]-1);
  const mu = rets.reduce((a,b) => a+b, 0) / rets.length;
  const vol = Math.sqrt(rets.reduce((a,b) => a + (b-mu)**2, 0) / rets.length) * Math.sqrt(52);
  const sh = vol > 0 ? (cagr - .04) / vol : 0;
  return { tr, cagr, mdd, vol, sh, fv: vals[vals.length-1] };
}

// ==================== Plotly ====================
const plotCfg = { responsive: true, scrollZoom: false, displayModeBar: !isMobile };
function layout(title, yTitle, extra) {
  return Object.assign({
    title: { text: isMobile ? '' : title, font: { size: 15, color: '#fff', family: 'Inter' } },
    paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
    font: { color: '#6b7280', size: isMobile ? 10 : 11, family: 'Inter' },
    xaxis: { gridcolor: '#21262d', showgrid: true, tickfont: { size: isMobile ? 9 : 11 } },
    yaxis: { title: isMobile ? '' : yTitle, gridcolor: '#21262d', showgrid: true, tickfont: { size: isMobile ? 9 : 11 } },
    legend: { visible: !isMobile, orientation: 'h', y: -0.18, font: { size: 10 } },
    hovermode: 'x unified',
    dragmode: isMobile ? false : 'zoom',
    margin: isMobile ? { t: 8, b: 30, l: 40, r: 8 } : { t: 46, b: 55, l: 65, r: 16 },
  }, extra || {});
}

function draw() {
  const range = getRange();
  const scale = document.getElementById('scaleSel').value;
  const rw = parseInt(document.getElementById('rollSel').value);
  const rwLabels = { 52: t('r_1y'), 156: t('r_3y'), 260: t('r_5y'), 520: t('r_10y') };

  // Growth
  const gT = [];
  Object.keys(D.series).forEach(name => {
    if (!vis[name]) return;
    const f = filt(D.series[name], range);
    const n = norm(f.v);
    gT.push({ x: f.d, y: n, name, type: 'scatter', mode: 'lines',
      line: { color: CLR[name], width: name.startsWith('Top') ? 2.5 : 1.5 },
      hovertemplate: '%{y:$,.0f}<extra>' + name + '</extra>' });
  });
  Plotly.react('cGrowth', gT, layout(t('ch_growth'), t('y_value'),
    { yaxis: { type: scale, gridcolor: '#21262d', tickprefix: '$', tickformat: ',.0f' } }), plotCfg);

  // Relative
  const spyF = filt(D.series["S&P 500"], range);
  const spyN = norm(spyF.v);
  const rT = [];
  Object.keys(D.series).forEach(name => {
    if (!vis[name] || name === "S&P 500") return;
    const f = filt(D.series[name], range);
    const n = norm(f.v);
    const rd = [], rv = [];
    let si = 0;
    for (let i = 0; i < f.d.length; i++) {
      while (si < spyF.d.length - 1 && spyF.d[si] < f.d[i]) si++;
      if (spyF.d[si] === f.d[i] && spyN[si] > 0) { rd.push(f.d[i]); rv.push(n[i] / spyN[si]); }
    }
    rT.push({ x: rd, y: rv, name, type: 'scatter', mode: 'lines',
      line: { color: CLR[name], width: 2 },
      hovertemplate: '%{y:.2f}x<extra>' + name + '</extra>' });
  });
  rT.push({ x: spyF.d, y: spyF.d.map(() => 1), name: 'S&P 500 baseline', type: 'scatter', mode: 'lines',
    line: { color: '#94a3b8', width: 1, dash: 'dash' }, hoverinfo: 'skip' });
  Plotly.react('cRelative', rT, layout(t('ch_relative'), t('y_ratio')), plotCfg);

  // Drawdown
  const ddT = [];
  Object.keys(D.series).forEach(name => {
    if (!vis[name]) return;
    const f = filt(D.series[name], range);
    let pk = f.v[0];
    const dd = f.v.map(v => { if (v > pk) pk = v; return ((v - pk) / pk) * 100; });
    ddT.push({ x: f.d, y: dd, name, type: 'scatter', mode: 'lines',
      line: { color: CLR[name], width: 1.5 }, fill: 'tozeroy',
      fillcolor: (CLR[name]||'#666') + '18',
      hovertemplate: '%{y:.1f}%<extra>' + name + '</extra>' });
  });
  Plotly.react('cDrawdown', ddT, layout(t('ch_drawdown'), t('y_dd'),
    { yaxis: { gridcolor: '#21262d', ticksuffix: '%' } }), plotCfg);

  // Rolling
  const rlT = [];
  Object.keys(D.series).forEach(name => {
    if (!vis[name]) return;
    const f = filt(D.series[name], range);
    if (f.v.length < rw) return;
    const rd = [], rv = [];
    for (let i = rw; i < f.v.length; i++) {
      const yrs = rw / 52;
      const cagr = (Math.pow(f.v[i] / f.v[i - rw], 1/yrs) - 1) * 100;
      rd.push(f.d[i]); rv.push(cagr);
    }
    rlT.push({ x: rd, y: rv, name, type: 'scatter', mode: 'lines',
      line: { color: CLR[name], width: 2 },
      hovertemplate: '%{y:.1f}%<extra>' + name + '</extra>' });
  });
  Plotly.react('cRolling', rlT, layout(t('ch_rolling_tpl').replace('{W}', rwLabels[rw] || ''), t('y_cagr'),
    { yaxis: { gridcolor: '#21262d', ticksuffix: '%', zeroline: true, zerolinecolor: '#30363d' } }), plotCfg);

  // Metrics
  updateMetrics(range);
}

function updateMetrics(range) {
  const grid = document.getElementById('metGrid');
  grid.innerHTML = '';
  const items = [];
  Object.keys(D.series).forEach(name => {
    const f = filt(D.series[name], range);
    const n = norm(f.v);
    const m = metrics(f.d, n);
    if (m) items.push({ name, m, c: CLR[name] || '#666' });
  });
  items.sort((a, b) => b.m.cagr - a.m.cagr);

  items.forEach(({ name, m, c }) => {
    const cc = m.cagr > .12 ? 'up' : m.cagr > .08 ? 'mid' : 'dn';
    const dc = m.mdd > -.3 ? 'up' : m.mdd > -.5 ? 'mid' : 'dn';
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = c;
    card.innerHTML = `
      <div class="name" style="color:${c}">${name}</div>
      <div class="row"><span class="lbl">${t('m_cagr')}</span><span class="val ${cc}">${pct(m.cagr)}</span></div>
      <div class="row"><span class="lbl">${t('m_total')}</span><span class="val">${pct(m.tr)}</span></div>
      <div class="row"><span class="lbl">${t('m_final')}</span><span class="val">${usd(m.fv)}</span></div>
      <div class="row"><span class="lbl">${t('m_dd')}</span><span class="val ${dc}">${pct(m.mdd)}</span></div>
      <div class="row"><span class="lbl">${t('m_vol')}</span><span class="val">${pct(m.vol)}</span></div>
      <div class="row"><span class="lbl">${t('m_sharpe')}</span><span class="val">${m.sh.toFixed(2)}</span></div>`;
    grid.appendChild(card);
  });
}

  const el = document.getElementById('introBlock');

    <p>${t('intro_p1')}</p><p>${t('intro_p2')}</p><p>${t('intro_p3')}</p>
    <div class="strategies">
      <div class="strat"><strong style="color:#ef4444">Top 1</strong><span>${t('strat_top1')}</span></div>
      <div class="strat"><strong style="color:#f97316">Top 3</strong><span>${t('strat_top3')}</span></div>
      <div class="strat"><strong style="color:#eab308">Top 5</strong><span>${t('strat_top5')}</span></div>
      <div class="strat"><strong style="color:#22c55e">Top 7 / <span style="color:#3b82f6">Top 10</span></strong><span>${t('strat_top710')}</span></div>
      <div class="strat"><strong style="color:#94a3b8">Indices</strong><span>${t('strat_idx')}</span></div>
    </div>`;
}

function buildGlossary() {
  const el = document.getElementById('glossaryBlock');
  const terms = [
    ['CAGR', t('gloss_cagr')],
    ['Max Drawdown', t('gloss_dd')],
    ['Sharpe Ratio', t('gloss_sharpe')],
    ['Market Cap', t('gloss_mcap')],
    ['Volatility', t('gloss_vol')],
    ['Rebalancing', t('gloss_rebal')]
  ];
  el.innerHTML = '<div class="glossary">' + terms.map(([dt,dd]) =>
    `<div class="term"><dt>${dt}</dt><dd>${dd}</dd></div>`
  ).join('') + '</div>';
}

function buildExplainers() {
  ['growth','relative','drawdown','rolling'].forEach(id => {
    const el = document.getElementById('exp-' + id);
    if (el) el.innerHTML = t('exp_' + id + '_html');
  });
}

// Init
buildToggles();
buildTabs();
showView();
buildHoldings();
buildMethod();
buildIntro();
buildGlossary();
buildExplainers();
applyI18n();
draw();
